services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gesture
      POSTGRES_PASSWORD: gesture
      POSTGRES_DB: gesturelab
    volumes:
      - gesture_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gesture -d gesturelab"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-ghcr.io/wongkino/ar-app:latest}
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gesture:gesture@db:5432/gesturelab
      PORT: "8080"
      STATIC_DIR: /app/public
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-gesture-admin}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gesture_pg:
